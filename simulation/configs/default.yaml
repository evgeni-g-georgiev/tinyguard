# ═══════════════════════════════════════════════════════════════════════════
# Simulation config — GMM-only, flat schema.
# No selectors, no named blocks.  Every key is a direct parameter.
# ═══════════════════════════════════════════════════════════════════════════

# ── Core node-learning knob ──────────────────────────────────────────────
channels:    [0, 4]   # MIMII mic indices; 1..8 entries, 0..7 values.
                      # len==1 ⇒ single-node run, no fusion.
                      # len>1  ⇒ one Group per machine, softmax(-σ/T) fusion.
temperature: 100.0    # Softmax temperature for fusion weights.
                      # T=1   → hard selection (reproduces collapse bug).
                      # T=100 → near-equal weights, small fit-quality bias.
                      # T→∞   → exactly equal weights.

# ── GMM / detector (all pass-through to gmm.detector.GMMDetector) ────────
gmm:
  n_mels:         64         # 32 / 64 / 128, mel filterbank resolution
  n_components:   2          # GMM mixture components (K)
  cusum_h_sigma:  20.0       # h = max(sigma * 20, cusum_h_floor); k = max(val_nlls)
  cusum_h_floor:  1.0
  seed:           42

# ── Simulation loop ──────────────────────────────────────────────────────
simulation:
  warmup_count:    60           # 50 fit + 10 val (matches gmm/ N_FIT_CLIPS + N_VAL_CLIPS)
  shuffle_mode:    block_fixed  # block_fixed | block_random | rounds | random
                                #
                                # block_fixed (default): continuous interleaved stream,
                                #   no boundary CUSUM reset.
                                # rounds: n_rounds × (normal_per_round, anomaly_per_round).
                                #   CUSUM is reset at every segment boundary so each
                                #   normal/anomaly window sees a fresh accumulator.
                                #   Reproduces the OLD gmm/evaluate.py per-round reset.
  # block_random / block_fixed params:
  block_size:      10           # 10-clip blocks ≈ teammate's 3-round windows
  block_interval:  10
  # rounds-mode params (ignored in block_* modes):
  n_rounds:          2          # round count. Budget cap: n_rounds * normal_per_round
                                # ≤ test_normal pool (currently 89). Same for anomaly.
                                # 2 × 30 = strict 30-clip windows (default).
                                # 3 × 29 ≈ OLD gmm/ 3-round layout (87 of each pool used).
  normal_per_round:  30
  anomaly_per_round: 30
  manual_reset:    false        # circuit-breaker mode for the state layer.
                                #   false ⇒ state == alarm per clip (auto-reset).
                                #   true  ⇒ state latches at first alarm, cleared
                                #           at anomaly→normal band boundary.
  seed:            42

# ── Plot hyperparameters ─────────────────────────────────────────────────
plot:
  show_per_node:           true    # draw all n node score traces (in groups)
  show_fused:              true    # draw NL fused trace (when n>1)
  show_cusum_accumulator:  true    # draw S_t line per node & group
  show_k_and_h_lines:      true    # horizontal dashed lines at k and h
  compare_node_idx:        0       # when n>1, 0-based index into `channels`
                                   # selecting which node to render in
                                   # plots/compare_single/ for baseline comparison
                                   # (e.g. with channels=[0, 4], idx=1 picks ch4)

# ── Latent plots (t-SNE on TWFR features) ────────────────────────────────
latent_plot:
  enabled:       false
  node_subset:   [0]              # which channel indices to t-SNE; [] = all.
                                  # One folder per node under plots/latent/.
  perplexity:    30
  random_state:  42

# ── SNR selection ────────────────────────────────────────────────────────
snr: "-6dB"        # 6dB | 0dB | -6dB

# ── Data ─────────────────────────────────────────────────────────────────
data:
  mimii_root:    data/mimii_{snr}
  splits_dir:    simulation/data/splits/{snr}
  machine_types: [fan, pump, slider, valve]
  machine_ids:   [id_00, id_02, id_04, id_06]
